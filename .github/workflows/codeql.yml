# .github/workflows/codeql.yml
#
# 【エラー履歴と根本原因まとめ】
#
# v74 (2026-05-26) 初回エラー:
#   GitHub "Default Setup" が github/codeql-action@v4 SHA
#   (7211b7c8077ea37d8641b6271f6a365a22a5fbfa) を内部ピン留めしており
#   そのSHAがGitHub側で取得不能になったためCI全落ち。
#   → このファイルを作成し Default Setup を上書きする形で対処。
#
# v75 (2026-05-27) 二回目エラー:
#   このカスタム workflow が動作し解析は完了するが、SARIFアップロード時に
#   "CodeQL analyses from advanced configurations cannot be processed
#    when the default setup is enabled" と拒否される。
#   → GitHub リポジトリ設定で Default Setup が「まだ有効」のままだったため。
#
# 【必須の人間操作 — AIは実行不可】
#   GitHub リポジトリ → Settings → Security → Code scanning
#   → Default Setup が有効になっているはずなので
#     「Disable」または「Switch to advanced setup」をクリックする。
#   これを実行しないと、このworkflowがいくら正しくても
#   SARIFアップロードが拒否され CI は失敗し続ける。
#
# 【バージョン方針】
#   v4 を使用。v3 は 2026年12月に廃止予定。
#   SHA ピン留めをせず floating tag (@v4) を使用。
#   dependabot.yml が月次で自動 PR を発行する。
#
# 【Node.js 24 対応】
#   2026-06-02 より GitHub Actions は Node.js 24 を強制。
#   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true で先行対応する。

name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # 毎週月曜 07:00 UTC
    - cron: "0 7 * * 1"

permissions:
  contents: read
  security-events: write

env:
  # 2026-06-02 より Node.js 24 強制移行。先行対応。
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze (javascript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
          queries: security-extended

      # Vanilla JS は autobuild 不要 (解釈型言語 / ビルドステップなし)

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript"
