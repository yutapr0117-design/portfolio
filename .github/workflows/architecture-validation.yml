name: Architecture Constraint Validation Pipeline

# ======================================================================
# 改善手順 v74 — Item 6: Zero-Inconsistency Pipeline（静的解析のみ）
# このワークフローはデプロイや本番書き込みを一切行わず、
# 「制約の検証のみ」を行う完全非破壊な監視レイヤーとして機能する。
# ======================================================================

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-level-constraints:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 20非推奨警告の根本解消（2026-06-02以降の強制移行に先行対応）
    steps:
      - name: Checkout repository codebase
        uses: actions/checkout@v4

      - name: Enforce CSP HTML Attribute Compliance (Level 2 Separation)
        run: |
          # NOTE: style-src の unsafe-inline は Boring Technology 単一ファイル SPA 制約により
          #       アーキテクチャ設計上維持されている（v73 Security Architecture Note 参照）。
          #       このチェックは HTML 要素の style="" 属性インジェクションのみを検査する。
          if grep -qP '<[^>]+\s+style="[^"]+"' index.html; then
            echo "::error::Architecture violation: HTML inline style=\"\" attributes detected. Use utility classes (u-ai-*) instead."
            exit 1
          else
            echo "CSP attribute validation passed. No HTML inline style= attributes detected."
          fi

      - name: Verify Canonical Ground Truth Status (llms-full.txt)
        run: |
          if [ ! -f "llms-full.txt" ]; then
            echo "::error::Missing llms-full.txt. Canonical source of truth is required."
            exit 1
          fi
          if ! grep -q "authoritative-status: Highest Priority" llms-full.txt; then
            echo "::error::Missing or incorrect Authoritative-Status injection in llms-full.txt"
            exit 1
          fi
          echo "llms-full.txt authoritative-status validation passed."

      - name: Validate Machine-Readable JSON-LD Structures
        run: |
          # sedは複数のJSON-LDブロックを正しく扱えないため、Pythonで各ブロックを個別に検証する。
          # （根本修正: 改善手順 v74 — 複数ブロック対応）
          python3 - << 'EOF'
          import re, json, sys, glob

          files = glob.glob('./**/*.html', recursive=True)
          error = False
          for filepath in sorted(files):
              with open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read()
              blocks = re.findall(
                  r'<script\s+type="application/ld\+json">(.*?)</script>',
                  content, re.DOTALL
              )
              for i, block in enumerate(blocks):
                  try:
                      json.loads(block.strip())
                  except json.JSONDecodeError as e:
                      print(f"::error::Invalid JSON-LD in {filepath} (block {i+1}): {e}")
                      error = True
          if error:
              sys.exit(1)
          print("JSON-LD validation passed.")
          EOF

      - name: Check Routing Integrity (Level 4 Crawler Control)
        run: |
          test -f robots.txt \
            || (echo "::error::robots.txt constraint missing" && exit 1)
          test -f llms.txt \
            || (echo "::error::llms.txt router missing" && exit 1)
          if ! grep -q "AI2AI.md" llms.txt; then
            echo "::warning::AI2AI.md is not referenced in llms.txt. Semantic handoff may fail."
          fi
          echo "Routing integrity validation passed."

      - name: Verify Constraint Metadata Tags (Level 7 Hardcoding)
        run: |
          if ! grep -q 'portfolio:identity:owner' index.html; then
            echo "::error::Missing portfolio:identity:owner meta tag in index.html"
            exit 1
          fi
          if ! grep -q 'portfolio:constraint:01' index.html; then
            echo "::error::Missing portfolio:constraint meta tags in index.html"
            exit 1
          fi
          echo "Constraint metadata validation passed."

      - name: Verify Body Canonical Attribute (Machine-Readability)
        run: |
          if ! grep -q 'data-canonical="https://yutapr0117-design.github.io/portfolio/"' index.html; then
            echo "::error::Missing data-canonical attribute on <body> element in index.html"
            exit 1
          fi
          echo "Body canonical attribute validation passed."

      - name: Verify Async Font Loading (Core Web Vitals)
        run: |
          if grep -qP '<link[^>]+fonts\.googleapis\.com[^>]+rel="stylesheet"[^>]*>' index.html; then
            echo "::warning::Synchronous font loading detected. Consider media=print onload pattern for LCP optimization."
          fi
          echo "Font loading check complete."
