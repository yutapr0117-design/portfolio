name: Architecture Constraint Validation Pipeline

# ======================================================================
# 非破壊的改善文書 — Zero-Inconsistency Pipeline
# このワークフローはデプロイや本番書き込みを一切行わず、
# 「制約の検証のみ」を行う完全非破壊な監視レイヤーとして機能する。
# ======================================================================

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  validate-level-constraints:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository codebase
        uses: actions/checkout@v4

      - name: Enforce CSP HTML Attribute Compliance (Level 2 Separation)
        run: |
          if grep -qP '<[^>]+\s+style="[^"]+"' index.html; then
            echo "::error::Architecture violation: HTML inline style attributes detected. Use utility classes instead."
            exit 1
          else
            echo "CSP attribute validation passed."
          fi

      - name: Validate AIO Custom Data Attributes (改善文書a 1.1)
        run: |
          python3 - << 'EOF'
          import re, sys
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()
          errors = []
          canonical_pattern = re.compile(r'data-canonical="([^"]*)"')
          for val in canonical_pattern.findall(content):
              if val and not val.startswith('https://yutapr0117-design.github.io/portfolio/'):
                  errors.append(f"data-canonical domain mismatch: '{val}'")
          ai_ctx_pattern = re.compile(r'data-ai-context="([^"]*)"')
          for val in ai_ctx_pattern.findall(content):
              if val and not val.startswith('https://'):
                  errors.append(f"data-ai-context not absolute https: '{val}'")
          if 'data-canonical="https://yutapr0117-design.github.io/portfolio/"' not in content:
              errors.append("Missing data-canonical on <body> element")
          if errors:
              for e in errors: print(f"::error::{e}")
              sys.exit(1)
          print("AIO data attribute validation passed.")
          EOF

      - name: Verify AIO Asset Anchor Presence (改善文書a 1.2)
        run: |
          if ! grep -q 'id="aio-asset-anchor"' index.html; then
            echo "::error::CRITICAL: AIO asset anchor <div id='aio-asset-anchor'> MISSING."
            exit 1
          fi
          if ! grep -q 'aio-guard.js' index.html; then
            echo "::warning::aio-guard.js not referenced in index.html. Self-repair monitor inactive."
          fi
          echo "AIO anchor presence validated."

      - name: Verify Canonical Ground Truth (llms-full.txt)
        run: |
          test -f llms-full.txt || (echo "::error::llms-full.txt missing" && exit 1)
          grep -q "authoritative-status: Highest Priority" llms-full.txt \
            || (echo "::error::Missing Authoritative-Status in llms-full.txt" && exit 1)
          echo "llms-full.txt validation passed."

      - name: Validate JSON-LD Structures
        run: |
          python3 - << 'EOF'
          import re, json, sys, glob
          files = glob.glob('./**/*.html', recursive=True)
          error = False
          for filepath in sorted(files):
              with open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read()
              blocks = re.findall(r'<script\s+type="application/ld\+json">(.*?)</script>', content, re.DOTALL)
              for i, block in enumerate(blocks):
                  try:
                      json.loads(block.strip())
                  except json.JSONDecodeError as e:
                      print(f"::error::Invalid JSON-LD in {filepath} block {i+1}: {e}")
                      error = True
          if error: sys.exit(1)
          print("JSON-LD validation passed.")
          EOF

      - name: Check Routing Integrity and AI Crawler Discoverability (改善文書b 6.1)
        run: |
          test -f robots.txt || (echo "::error::robots.txt missing" && exit 1)
          test -f llms.txt || (echo "::error::llms.txt missing" && exit 1)
          test -f .nojekyll || echo "::warning::.nojekyll missing — Jekyll may corrupt llms.txt Content-Type"
          test -f ".well-known/llms.txt" || echo "::warning::.well-known/llms.txt missing — some AI crawlers prefer this path"
          grep -q "AI2AI.md" llms.txt || echo "::warning::AI2AI.md not referenced in llms.txt"
          echo "Routing integrity validation passed."

      - name: Validate llms.txt Internal File References (改善文書a 4.2)
        run: |
          python3 - << 'EOF'
          import re, os, sys
          with open('llms.txt', 'r', encoding='utf-8') as f:
              content = f.read()
          errors = []
          for line in content.splitlines():
              for ref in re.findall(r'\[.*?\]\((?!https?://)([^)]+)\)', line):
                  path = ref.split('#')[0].strip()
                  if path and not os.path.exists(path):
                      errors.append(f"Dead relative link in llms.txt: '{path}'")
          if errors:
              for e in errors: print(f"::error::{e}")
              sys.exit(1)
          print("llms.txt internal reference check passed.")
          EOF

      - name: Verify Constraint Metadata Tags
        run: |
          grep -q 'portfolio:identity:owner' index.html \
            || (echo "::error::Missing portfolio:identity:owner meta tag" && exit 1)
          grep -q 'portfolio:constraint:01' index.html \
            || (echo "::error::Missing portfolio:constraint meta tags" && exit 1)
          echo "Constraint metadata validation passed."

      - name: Verify Binary Asset Protection (改善文書a 5.1 / 改善文書b 9)
        run: |
          test -f ".gitattributes" || (echo "::error::.gitattributes missing — binary assets unprotected from CRLF corruption" && exit 1)
          grep -q "*.webp.*binary" .gitattributes || echo "::warning::.gitattributes: *.webp not marked binary (XMP at risk)"
          grep -q "*.mp3.*binary" .gitattributes || echo "::warning::.gitattributes: *.mp3 not marked binary (ID3v2.4 at risk)"
          echo "Binary asset protection check complete."

      - name: Verify GSC File Format (改善文書a 5.1)
        # GSCファイルはGoogle仕様上、認証トークン1行のみを含む必要がある。
        # AIOコンテンツはllms-full.txtに集約済み（意図的な設計）。
        # ここではGoogle仕様準拠を確認する（AIOアノテーションは不要）。
        run: |
          for gsc_file in google*.html; do
            if [ -f "$gsc_file" ]; then
              if grep -q "google-site-verification" "$gsc_file"; then
                echo "$gsc_file: GSC token present — PASS"
              else
                echo "::error::$gsc_file: google-site-verification token missing"
                exit 1
              fi
            fi
          done

      - name: Verify Trusted Types Policy (XSS Prevention)
        run: |
          grep -q "trustedTypes.createPolicy" index.html || echo "::warning::Trusted Types createPolicy() not found"
          grep -q "require-trusted-types-for" index.html || echo "::warning::CSP require-trusted-types-for directive missing"
          echo "Trusted Types check complete."

      - name: "BLOCKING: Version Consistency Check across all canonical fields (P0-09)"
        run: |
          python3 - << 'EOF'
          import re, json, sys
          errors = []
          warnings = []

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          with open('AI2AI.md', 'r', encoding='utf-8') as f:
              ai2ai = f.read()
          with open('main.js', 'r', encoding='utf-8') as f:
              mainjs = f.read()
          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()
          with open('llms.txt', 'r', encoding='utf-8') as f:
              llms = f.read()
          with open('llms-full.txt', 'r', encoding='utf-8') as f:
              llms_full = f.read()
          with open('.well-known/mcp.json', 'r', encoding='utf-8') as f:
              mcp = json.load(f)

          def extract(pattern, text, default=None):
              m = re.search(pattern, text)
              return m.group(1) if m else default

          html_v   = extract(r'name="ai:version"\s+content="(v\d+)"', html)
          ai2ai_v  = extract(r'Pipeline-Version\s*:\s*(v\d+)', ai2ai)
          mainjs_v = extract(r"VERSION:\s*['"]?(v\d+)['"]?", mainjs)
          readme_v = extract(r'Current version[:\s]+(v\d+)', readme)
          llms_v   = extract(r'^- Version:\s*(v\d+)', llms, None) or extract(r'Version:\s*(v\d+)', llms)
          llmsfull_v = extract(r'\*\*Version:\*\*\s*(v\d+)', llms_full)
          mcp_v    = mcp.get('server', {}).get('version', '')
          # mcp version format: "74.0.0" → expect starts with same major as pipeline v74 → 74
          mcp_major = mcp_v.split('.')[0] if mcp_v else None
          html_major = html_v.lstrip('v') if html_v else None

          versions = {
              'index.html ai:version': html_v,
              'AI2AI.md Pipeline-Version': ai2ai_v,
              'main.js VERSION': mainjs_v,
              'llms.txt Version': llms_v,
              'llms-full.txt Version': llmsfull_v,
          }

          print("Version field values:")
          for k, v in versions.items():
              print(f"  {k} = {v}")
          print(f"  README.md Current version = {readme_v}")
          print(f"  mcp.json server.version = {mcp_v}")

          # Check all present canonical fields match
          present = {k: v for k, v in versions.items() if v}
          unique = set(present.values())
          if len(unique) > 1:
              errors.append(f"BLOCKING: Version mismatch across canonical fields: {present}")

          # Check mcp.json major version
          if mcp_major and html_major and mcp_major != html_major:
              errors.append(f"BLOCKING: mcp.json server.version major ({mcp_major}) != ai:version ({html_v})")

          # Check style.css has no stale v73 current-release comment (P0-03)
          with open('style.css', 'r', encoding='utf-8') as f:
              css = f.read()
          if 'Current release: v73' in css or 'NEXT_PLANNED_RELEASE' in css:
              errors.append("BLOCKING: style.css still contains stale v73 current-release comment")

          for e in errors:
              print(f"::error::{e}")
          if errors:
              sys.exit(1)

          print("Version consistency check complete — all fields aligned.")
          EOF

      - name: Verify Async Font Loading (Core Web Vitals)
        run: |
          if grep -qP '<link[^>]+fonts\.googleapis\.com[^>]+rel="stylesheet"[^>]*>' index.html; then
            echo "::warning::Synchronous font loading detected. Consider media=print onload pattern."
          fi
          echo "Font loading check complete."

      # ── 16. チェックサム差分マトリクス検証 (改善文書a 7.3) ────────────────
      # index.html の AIOカスタム属性命名規則が変更された場合、
      # aio-guard.js のチェックサムが変化していないと「修正漏れ」と判定する。
      - name: Checksum Dependency Matrix Validation (改善文書a 7.3)
        run: |
          python3 - << 'EOF2'
          import hashlib, re, os, sys

          def sha256_file(path):
              if not os.path.exists(path):
                  return None
              with open(path, 'rb') as f:
                  return hashlib.sha256(f.read()).hexdigest()

          # Extract AIO attribute names used in index.html
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          aio_attrs = sorted(set(re.findall(r'data-(?:entity|canonical|ai-context|asset-role)\b', html)))

          # Check aio-guard.js references matching attributes
          guard_exists = os.path.exists('aio-guard.js')
          if guard_exists:
              with open('aio-guard.js', 'r', encoding='utf-8') as f:
                  guard_content = f.read()
              # aio-guard.js must reference 'aio-asset-anchor' (its sole protected node)
              if 'aio-asset-anchor' not in guard_content:
                  print('::error::aio-guard.js does not reference aio-asset-anchor — guard is ineffective.')
                  sys.exit(1)

          # Log checksums for audit trail
          files_to_check = ['index.html', 'aio-guard.js', 'sw.js', 'llms.txt', 'llms-full.txt', 'robots.txt']
          print('=== Checksum Audit Matrix ===')
          for f in files_to_check:
              h = sha256_file(f)
              print(f'{f}: {h or "MISSING"}')

          print(f'AIO attributes found: {aio_attrs}')
          print('Checksum matrix validation complete.')
          EOF2

      # ── 17. SRI 外部リソース整合性チェック (改善文書a 2.2) ───────────────
      - name: External Resource SRI Presence Check (改善文書a 2.2)
        run: |
          python3 - << 'EOF3'
          import re, sys

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # Find external script/link tags without integrity attribute
          # Google Fonts and KARTE are explicitly exempted per Security Architecture Note (v73)
          EXEMPTED_DOMAINS = ['fonts.googleapis.com', 'fonts.gstatic.com', 'cdn-edge.karte.io', 'static.karte.io']

          external_scripts = re.findall(r'<script[^>]+src="(https://[^"]+)"[^>]*>', content, re.IGNORECASE)
          external_styles  = re.findall(r'<link[^>]+href="(https://[^"]+)"[^>]+rel=["\']stylesheet["\'][^>]*>', content, re.IGNORECASE)

          warnings = []
          for url in external_scripts + external_styles:
              is_exempt = any(domain in url for domain in EXEMPTED_DOMAINS)
              if not is_exempt:
                  # Check if integrity is present alongside this URL
                  context = content[max(0, content.find(url)-50):content.find(url)+len(url)+200]
                  if 'integrity=' not in context:
                      warnings.append(f'External resource without SRI: {url}')

          for w in warnings:
              print(f'::warning::{w}')

          print(f'SRI check complete. {len(warnings)} resources without SRI (non-exempted).')
          EOF3

      # ── 18. Blocking: llms.txt == .well-known/llms.txt (WP-13 / WP-08) ──────
      # These files MUST be byte-identical. Any drift is a blocking error.
      - name: "BLOCKING: llms.txt byte-identity with .well-known/llms.txt"
        run: |
          if ! diff -q llms.txt .well-known/llms.txt > /dev/null 2>&1; then
            echo "::error::BLOCKING: llms.txt and .well-known/llms.txt are NOT byte-identical. Sync them before merging."
            diff llms.txt .well-known/llms.txt | head -20
            exit 1
          fi
          echo "llms.txt == .well-known/llms.txt: PASS"

      # ── 19. Blocking: .well-known/index.json == .well-known/agent-skills/index.json ──
      - name: "BLOCKING: .well-known/index.json identity with agent-skills/index.json"
        run: |
          if ! diff -q .well-known/index.json .well-known/agent-skills/index.json > /dev/null 2>&1; then
            echo "::error::BLOCKING: .well-known/index.json and .well-known/agent-skills/index.json differ. Sync them."
            exit 1
          fi
          echo ".well-known/index.json == .well-known/agent-skills/index.json: PASS"

      # ── 20. Blocking: sitemap.xml XML validity ─────────────────────────────
      - name: "BLOCKING: sitemap.xml XML parse"
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET, sys
          try:
              ET.parse('sitemap.xml')
              print('sitemap.xml: XML parse PASS')
          except ET.ParseError as e:
              print(f'::error::BLOCKING: sitemap.xml parse failed: {e}')
              sys.exit(1)
          "

      # ── 21. Blocking: mcp.json JSON validity ──────────────────────────────
      - name: "BLOCKING: .well-known/mcp.json JSON parse"
        run: |
          python3 -c "
          import json, sys
          try:
              with open('.well-known/mcp.json') as f: json.load(f)
              print('.well-known/mcp.json: JSON parse PASS')
          except json.JSONDecodeError as e:
              print(f'::error::BLOCKING: .well-known/mcp.json parse failed: {e}')
              sys.exit(1)
          "

      # ── 22. Advisory: Security header classification note (WP-02 / 改善文書a 2.3) ──
      # GitHub Pages does not support custom HTTP response headers.
      # X-Content-Type-Options, X-Frame-Options, frame-ancestors are header-only controls.
      # This step documents what cannot be enforced at the repo level (advisory, not blocking).
      - name: "Advisory: Security Header Enforcement Classification (WP-02)"
        run: |
          echo "=== Security Control Classification (WP-02) ==="
          echo "Category A (Effective via meta/application layer):"
          python3 -c "
          import re
          with open('index.html') as f: c = f.read()
          csp = re.findall(r'<meta[^>]+Content-Security-Policy[^>]*>', c, re.IGNORECASE)
          print(f'  CSP meta tags found: {len(csp)}')
          print('  - script-src, style-src: effective via meta')
          "
          echo ""
          echo "Category B (Requires HTTP response headers — NOT enforceable by static GitHub Pages alone):"
          echo "  - X-Content-Type-Options: nosniff (header-only)"
          echo "  - X-Frame-Options (header-only)"
          echo "  - CSP frame-ancestors (meta element has no effect per MDN)"
          echo "  - HSTS (header-only)"
          echo "  Ref: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/Content-Security-Policy/frame-ancestors"
          echo ""
          echo "Category C (AIO/documentation signals only):"
          echo "  - robots.txt, sitemap.xml, llms.txt, llms-full.txt, JSON-LD, XMP, ID3"
          echo ""
          echo "Advisory check complete. No merge block for informational classification."

      # ═══════════════════════════════════════════════════════════════════════
      # カテゴリA 残余5項目 — 改善文書a §3.1/3.2/4.1/5.1/6.1
      # ═══════════════════════════════════════════════════════════════════════

      # ── 23. BLOCKING: JS構文チェック via node --check (改善文書a 3.1)
      # 設計判断: Boring Technology = TypeScript非採用。tsc strict型検査は
      # 有効なDOM APIパターンを誤検出する。node --check で構文エラーのみを確実に検出。
      # PythonロジックはYAML外部スクリプトに完全移動(YAML/Pythonクォート干渉を根本排除)。
      - name: "BLOCKING: JS syntax check via node --check (改善文書a 3.1)"
        run: |
          LINT_TARGET="main.js error-suppressor.js karte-init.js theme-init.js aio-guard.js sw.js"
          if [ -d "js" ] && ls js/*.js 1>/dev/null 2>&1; then
            LINT_TARGET="js/**/*.js $LINT_TARGET"
          fi
          for file in $LINT_TARGET; do
            if [ -f "$file" ]; then
              node --check "$file" || (echo "::error::Syntax error in $file" && exit 1)
            fi
          done
          echo "node --check: PASS"

      # ── 24. BLOCKING: ESLint 論理バグパターン検査 (改善文書a 3.2) ──────────
      - name: "BLOCKING: ESLint logical bug pattern validation (改善文書a 3.2)"
        run: |
          npm install --no-save eslint 2>/dev/null
          # JS-CSS separation (v74+): main.js and other .js files are now external.
          # Direct lint coverage replaces the inline-extraction fallback.
          LINT_TARGET="main.js error-suppressor.js karte-init.js theme-init.js aio-guard.js sw.js"
          # Retain js/ directory support for future modularisation
          if [ -d "js" ] && ls js/*.js 1>/dev/null 2>&1; then
            LINT_TARGET="js/**/*.js $LINT_TARGET"
          fi
          cp .eslintrc.json /tmp/_eslintrc.json
          npx eslint "$LINT_TARGET"             --no-eslintrc --config /tmp/_eslintrc.json             --env browser --env es2022             --max-warnings=0             2>&1 | tee /tmp/eslint-output.txt || true
          ERROR_COUNT=$(grep -cE "^[[:space:]]+[0-9]+:[0-9]+[[:space:]]+error" /tmp/eslint-output.txt || true)
          if [ "$ERROR_COUNT" -gt "0" ]; then
            echo "::error::BLOCKING: $ERROR_COUNT ESLint error(s) detected."
            grep -E "error" /tmp/eslint-output.txt | head -20
            exit 1
          fi
          WARN_COUNT=$(grep -cE "^[[:space:]]+[0-9]+:[0-9]+[[:space:]]+warning" /tmp/eslint-output.txt || true)
          echo "ESLint: PASS ($ERROR_COUNT errors, $WARN_COUNT warnings)"
          python3 -c "import json; json.load(open('.eslintrc.json')); print('.eslintrc.json: JSON parse PASS')"

      # ── 25. BLOCKING: AI2AI.md コミット単位ドリフト検出 (改善文書a 4.1)
      # 「絶対日付比較」ではなく「今回のコミット(HEAD)単位」で検出する設計に変更。
      # 理由: 絶対日付比較だと「重要ファイルを過去にコミットした」だけで永遠にブロックされる。
      # 正しい意図: 今回のHEADコミットで重要ファイルを変更したのにAI2AI.mdを更新し忘れた場合のみエラー。
      - name: "BLOCKING: AI2AI.md commit-level drift detection (改善文書a 4.1)"
        run: |
          python3 - << 'EOF'
          import subprocess, sys, re, os

          def git_files_in_commit(ref='HEAD'):
              r = subprocess.run(
                  ['git', 'diff-tree', '--no-commit-id', '-r', '--name-only', ref],
                  capture_output=True, text=True
              )
              return set(r.stdout.strip().splitlines())

          # HEADコミットで変更されたファイル一覧
          changed = git_files_in_commit('HEAD')
          print(f"Files changed in HEAD commit: {sorted(changed)}")

          # 監視対象の重要ファイル (Authoritative Ground Truth)
          with open('AI2AI.md', 'r', encoding='utf-8') as f:
              ai2ai_content = f.read()
          gt_files = re.findall(r'Authoritative-GT\s*:\s*https?://[^\s]+/([^\s]+)', ai2ai_content)
          watch_files = list(set(gt_files)) or ['llms-full.txt', 'llms.txt', 'index.html']
          print(f"Watching: {watch_files}")

          # 今回のHEADコミットで重要ファイルが変更されたか
          gt_changed = [f for f in watch_files if f in changed]

          if not gt_changed:
              print("No authoritative files changed in this commit — drift check: SKIP")
              sys.exit(0)

          # 重要ファイルが変更された → AI2AI.md も同じコミットで更新されているべき
          if 'AI2AI.md' not in changed:
              print(f"::error::BLOCKING: {gt_changed} changed in this commit but AI2AI.md was NOT updated.")
              print("::error::Please update AI2AI.md Last-Updated and Pipeline-Version in the same commit.")
              sys.exit(1)

          # AI2AI.md も更新されている → Last-Updated の日付が正しいかだけ確認
          m = re.search(r'Last-Updated\s*:\s*(\d{4}-\d{2}-\d{2})', ai2ai_content)
          if not m:
              print("::warning::AI2AI.md: Last-Updated field not found")
          else:
              print(f"AI2AI.md Last-Updated: {m.group(1)} — updated in same commit: PASS")

          # Authoritative-GT ファイルの存在確認
          for p in watch_files:
              if os.path.exists(p):
                  print(f"  {p}: exists PASS")
              else:
                  print(f"::error::BLOCKING: Authoritative GT file missing: {p}")
                  sys.exit(1)

          print("AI2AI.md commit-level drift check: PASS")
          EOF

      # ── 26. Advisory: exiftool / ffprobe バイナリメタデータ検査 (改善文書a 5.1) ──
      # XMP (WebP) と ID3v2.4 TXXX (MP3) の AIO メタデータが保持されているかを検証。
      # GitHub Pages のランナー環境によっては exiftool/ffprobe が使えない場合がある。
      # その場合は警告のみとし、マージをブロックしない (Advisory)。
      - name: "Advisory: Binary AIO metadata integrity check (改善文書a 5.1)"
        run: |
          set +e  # exiftool が無い環境でも失敗しない

          WEBP=$(find . -name "*.webp" -not -path "*/node_modules/*" | head -1)
          MP3=$(find . -name "*.mp3" -not -path "*/node_modules/*" | head -1)

          echo "=== AIO Binary Metadata Check (改善文書a 5.1) ==="

          # exiftool で WebP の XMP を確認
          if command -v exiftool &>/dev/null && [ -n "$WEBP" ]; then
            XMP_OUT=$(exiftool -XMP:All "$WEBP" 2>/dev/null)
            if echo "$XMP_OUT" | grep -qi "Yuta\|yokoi\|yutapr0117\|ai.pm\|canonical"; then
              echo "WebP XMP AIO tag: PRESENT ($WEBP)"
            else
              echo "::warning::WebP XMP AIO tag may be missing or stripped: $WEBP"
            fi
          elif ! command -v exiftool &>/dev/null; then
            # exiftool 非インストール時は apt でインストール試行
            sudo apt-get install -y libimage-exiftool-perl 1>/dev/null 2>&1 || true
            if command -v exiftool &>/dev/null && [ -n "$WEBP" ]; then
              XMP_OUT=$(exiftool -XMP:All "$WEBP" 2>/dev/null)
              if echo "$XMP_OUT" | grep -qi "Yuta\|yokoi\|yutapr0117\|canonical"; then
                echo "WebP XMP AIO tag: PRESENT ($WEBP)"
              else
                echo "::warning::WebP XMP AIO tag may be missing or stripped: $WEBP"
              fi
            else
              echo "::warning::exiftool not available — WebP XMP check skipped"
            fi
          fi

          # python で MP3 の ID3 バージョンを確認 (exiftool 不要のフォールバック)
          if [ -n "$MP3" ]; then
            python3 - << PYEOF
          import sys
          mp3_path = "$MP3"
          try:
              with open(mp3_path, 'rb') as f:
                  header = f.read(10)
              if header[:3] == b'ID3':
                  major = header[3]
                  minor = header[4]
                  print(f"MP3 ID3 version: 2.{major}.{minor}")
                  if major >= 4:
                      print(f"ID3v2.4: PASS")
                  else:
                      print(f"::warning::ID3 version is 2.{major} — expected 2.4 per 改善文書a 5.1")
              else:
                  print(f"::warning::No ID3 header found in {mp3_path}")
          except Exception as e:
              print(f"::warning::MP3 ID3 check failed: {e}")
          PYEOF
          fi

          # GSC ファイルの形式確認（AIOコンテンツはllms-full.txtに集約済み）
          for gsc_file in google*.html; do
            if [ -f "$gsc_file" ]; then
              if grep -q "google-site-verification" "$gsc_file"; then
                echo "GSC file format: PASS ($gsc_file)"
              else
                echo "::warning::GSC file missing verification token: $gsc_file"
              fi
            fi
          done

          echo "Binary metadata advisory check complete."

      # ── 27. BLOCKING: Stylelint CSS 詳細度・変数整合性検査 (改善文書a 6.1/6.2)
      # Pythonロジックを外部スクリプトに完全移動。
      # --max-warnings=-1 フラグで warning のみの場合は exit 0 になるため、
      # severity:warning のルールが既存コードにヒットしてもCIをブロックしない。
      # BLOCKING for error-severity; warning-severity is non-blocking (by stylelint --max-warnings=-1 design).
      # check_css_stylelint.py now covers style.css AND inline <style> blocks.
      # The direct npx stylelint call below is removed to avoid double-reporting;
      # all logic is consolidated in check_css_stylelint.py.
      - name: "BLOCKING(error)/ADVISORY(warning): Stylelint CSS specificity and variable enforcement (P0-16/P0-17)"
        run: |
          npm install --no-save stylelint@16 stylelint-declaration-strict-value@1 2>/dev/null
          python3 .github/scripts/check_css_stylelint.py

      # ── 28. BLOCKING: AIO digest consistency (改善文書 P5/P6) ──────────────
      # Verifies .well-known/index.json == .well-known/agent-skills/index.json
      # and that each digest matches the SHA-256 of the corresponding local file.
      - name: "BLOCKING: AIO digest consistency"
        run: python3 .github/scripts/check_aio_digests.py

      # ── 29. BLOCKING: Binary AIO metadata integrity (改善文書 P12) ─────────
      # Verifies WebP XMP chunk and MP3 ID3v2.4 contain required AIO terms.
      # Prevents silent loss of AIO metadata through binary re-encoding accidents.
      - name: "BLOCKING: Binary AIO metadata integrity (WebP XMP / MP3 ID3)"
        run: python3 .github/scripts/check_binary_aio_metadata.py

      # ── 30. BLOCKING: Repository consistency (P0-23) ─────────────────────
      # Cross-file invariants: version alignment, llms alias byte-identity,
      # CSP position, stale markers, Python syntax.
      - name: "BLOCKING: Repository consistency check (P0-23)"
        run: python3 .github/scripts/check_repository_consistency.py

      # ── 31. ADVISORY: CSP meta position and inline handler audit (P1-04) ─
      # Warns if inline event handlers (on*=) are detected in index.html.
      # This is advisory because some framework-free patterns legitimately use them.
      - name: "ADVISORY: CSP inline handler audit (P1-04)"
        run: |
          python3 - << 'EOF'
          import re, sys
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          # Check for inline event handlers (advisory only)
          handlers = re.findall(r'\b(on\w+)=["\']', html)
          if handlers:
              unique = sorted(set(handlers))
              print(f"::warning::CSP inline handler audit: {len(handlers)} inline handler(s) found in index.html: {unique}")
              print("  These may conflict with a strict CSP script-src without 'unsafe-inline'.")
              print("  If intentional, document each handler in AI2AI.md CSP Architecture Note.")
          else:
              print("CSP inline handler audit: no inline event handlers found in index.html.")

          # Confirm CSP is before error-suppressor.js
          pos_csp = html.find('<meta http-equiv="Content-Security-Policy"')
          pos_err = html.find('<script src="./error-suppressor.js">')
          if pos_csp == -1:
              print("::error::CSP meta not found in index.html")
              sys.exit(1)
          if pos_csp >= pos_err:
              print("::error::BLOCKING: CSP meta must appear before error-suppressor.js script tag")
              sys.exit(1)
          print(f"CSP meta position check OK: CSP at {pos_csp}, error-suppressor at {pos_err}")
          EOF
