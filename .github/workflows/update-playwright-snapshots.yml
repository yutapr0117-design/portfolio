name: Update Playwright Baseline Snapshots

# ======================================================================
# Playwright スナップショット ベースライン更新ワークフロー
#
# playwright-regression.yml の toHaveScreenshot() テストは、
# e2e/portfolio.spec.js-snapshots/ に保存されたベースライン画像と
# 現在のレンダリングを比較する。
#
# ベースラインが存在しない場合、または意図的なUI変更後にベースラインを
# 更新したい場合に、このワークフローを手動実行する。
#
# テスト定義: e2e/portfolio.spec.js（regression.yml と共通ファイル）
# 設定:       playwright.config.cjs（同上）
#
# 手順:
#   1. GitHub Actions の "Run workflow" ボタンで手動実行する。
#   2. Actions が新しいスナップショットを artifacts にアップロードする。
#   3. artifacts をダウンロードし、e2e/ ディレクトリに配置して commit / push する。
#   4. 次回の playwright-regression.yml 実行から新ベースラインが使われる。
#
# 注意: このワークフローは直接 main にコミットしない（人間のレビューゲートを保持）。
# ======================================================================

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "ベースライン更新の理由（任意）"
        required: false
        default: "manual baseline update"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  # Minimal scope for the baseline-commit pipeline (see "Commit baseline via PR" below):
  #   contents: write       — push the generated PNGs onto a new branch
  #   pull-requests: write  — open the pull request that carries them
  # This intentionally elevates from the previous `contents: read`: the workflow's
  # job changed from "upload an artifact a human downloads" to "commit the baseline
  # via a reviewable PR". The elevation is scoped to exactly these two permissions
  # and no more (satisfying CodeQL CWE-275 MissingActionsPermissions), and mirrors
  # the write-capable pattern already used by auto-update-aio-digests.yml. The PR
  # (rather than a direct push to main) preserves the human review gate that this
  # workflow's design has always required.
  contents: write
  pull-requests: write

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # v80+ CI hygiene: cache npm downloads keyed on
          # package-lock.json so `npm ci` restores from cache on repeat runs.
          cache: 'npm'

      - name: Install Playwright and dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Generate baseline snapshots
        env:
          # P0-01: signals e2e/portfolio.spec.js to NOT skip the screenshot test
          # when a baseline is absent, so --update-snapshots can capture the first baseline.
          PLAYWRIGHT_UPDATE_SNAPSHOTS: "1"
        run: npx playwright test --config=playwright.config.cjs --update-snapshots --reporter=list
        continue-on-error: true

      - name: Verify generated baseline snapshots exist
        # P1-03 (v80+ CI hygiene): "Generate baseline snapshots" runs with
        # continue-on-error: true so a partial Playwright failure still lets us
        # collect whatever PNGs were produced. The hazard is the opposite case —
        # ZERO PNGs generated, yet the job still reports success and a human
        # downloads an empty artifact. This BLOCKING gate fails the run when no
        # *-snapshots/*.png exists, converting a silent empty-baseline into a
        # hard error before the upload step.
        run: |
          if ! find e2e -path '*-snapshots/*.png' -type f | grep -q .; then
            echo "::error::No Playwright baseline PNG files were generated. Refusing to upload an empty artifact."
            exit 1
          fi

      - name: Upload new snapshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-baseline-snapshots-${{ github.run_id }}
          path: e2e/**/*.png
          retention-days: 30
          # P1-03: belt-and-suspenders with the verification gate above — if the
          # glob matches nothing, fail rather than publishing an empty artifact.
          # NOTE: the artifact upload is retained as a fallback even though the
          # PR step below now commits the baseline directly. If anything about the
          # PR creation fails, a maintainer can still recover the PNGs from here.
          if-no-files-found: error

      - name: Commit baseline via pull request
        # This step closes the historical "last mile" gap. Previously the workflow
        # only uploaded an artifact, so a human had to download the PNGs and commit
        # them by hand — a manual round-trip that was never completed, which is why
        # no baseline has ever existed in the repository. We now open a pull request
        # carrying the generated snapshots so the baseline becomes one review-and-merge
        # away, rather than a manual file-shuffling chore.
        #
        # Why a PR and not a direct push to main: this workflow's design has always
        # required a human review gate (it must NOT commit straight to main). A PR
        # satisfies both goals at once — it removes the friction while keeping a human
        # in the loop to approve the new baseline before it becomes the reference the
        # regression suite enforces.
        #
        # Security notes:
        #   - The user-supplied `reason` is passed through the action's own body input
        #     (data, not shell code), never interpolated into a run: script — consistent
        #     with the CWE-094 fix in the instructions step.
        #   - The action is pinned to a major version and uses the workflow's scoped
        #     token (contents: write + pull-requests: write declared above, nothing more).
        uses: peter-evans/create-pull-request@v6
        with:
          # Only the generated baseline PNGs should ride in this PR — nothing else
          # in the tree is expected to change during a baseline-generation run.
          add-paths: |
            e2e/**/*.png
          branch: playwright-baseline/update-${{ github.run_id }}
          delete-branch: true
          commit-message: |
            test(e2e): update Playwright visual-regression baseline snapshots

            Generated by the update-playwright-snapshots workflow (run ${{ github.run_id }}).
          title: "test(e2e): update Playwright baseline snapshots (run ${{ github.run_id }})"
          # github.event.inputs.reason is interpolated by Actions into a STRING input
          # of the action (the PR body), not into a shell command — so this is not a
          # command-injection surface. At worst a crafted reason affects only PR body text.
          body: |
            ## Playwright baseline snapshot update

            This pull request was generated automatically by the
            **Update Playwright Baseline Snapshots** workflow.

            - It contains the visual-regression baseline PNG(s) captured by
              `npx playwright test --update-snapshots` in CI (where Chromium can run).
            - Merging it finalizes the baseline. The next `playwright-regression`
              run on a PR touching rendered assets will then enforce the screenshot
              diff against these images (the Stage 5 prerequisite).

            **Reason given at dispatch:** ${{ github.event.inputs.reason }}

            > Review the rendered screenshots in the diff before merging. Once merged,
            > these images become the reference the visual-regression gate compares against.

      - name: Print instructions
        # Security (CWE-094 command injection): the workflow_dispatch `reason`
        # input is user-controlled. It MUST NOT be interpolated directly into the
        # shell script via ${{ ... }} (that pastes raw user text into the command,
        # so a crafted reason like '"; rm -rf . #' would execute). Instead we bind
        # it to an environment variable and reference it as "$REASON": the shell
        # expands the *value* without re-parsing it as code. This is the pattern
        # CodeQL's actions-queries (CWE-094 CodeInjectionCritical) enforce.
        env:
          REASON: ${{ github.event.inputs.reason }}
        run: |
          echo "======================================================"
          echo "Baseline snapshots generated and committed via pull request."
          echo "Review and merge the PR to finalize the baseline; the next"
          echo "playwright-regression run will then enforce the screenshot diff."
          echo "Reason: $REASON"
          echo "======================================================"
