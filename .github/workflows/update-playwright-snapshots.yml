name: Update Playwright Baseline Snapshots

# ======================================================================
# Playwright スナップショット ベースライン更新ワークフロー
#
# playwright-regression.yml の toHaveScreenshot() テストは、
# e2e/portfolio.spec.js-snapshots/ に保存されたベースライン画像と
# 現在のレンダリングを比較する。
#
# ベースラインが存在しない場合、または意図的なUI変更後にベースラインを
# 更新したい場合に、このワークフローを手動実行する。
#
# テスト定義: e2e/portfolio.spec.js（regression.yml と共通ファイル）
# 設定:       playwright.config.cjs（同上）
#
# 手順:
#   1. GitHub Actions の "Run workflow" ボタンで手動実行する。
#   2. Actions が新しいスナップショットを artifacts にアップロードする。
#   3. artifacts をダウンロードし、e2e/ ディレクトリに配置して commit / push する。
#   4. 次回の playwright-regression.yml 実行から新ベースラインが使われる。
#
# 注意: このワークフローは直接 main にコミットしない（人間のレビューゲートを保持）。
# ======================================================================

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "ベースライン更新の理由（任意）"
        required: false
        default: "manual baseline update"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright and dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Generate baseline snapshots
        env:
          # P0-01: signals e2e/portfolio.spec.js to NOT skip the screenshot test
          # when a baseline is absent, so --update-snapshots can capture the first baseline.
          PLAYWRIGHT_UPDATE_SNAPSHOTS: "1"
        run: npx playwright test --config=playwright.config.cjs --update-snapshots --reporter=list
        continue-on-error: true

      - name: Upload new snapshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-baseline-snapshots-${{ github.run_id }}
          path: e2e/**/*.png
          retention-days: 30

      - name: Print instructions
        run: |
          echo "======================================================"
          echo "Baseline snapshots generated."
          echo "Download the artifact 'playwright-baseline-snapshots-${{ github.run_id }}'"
          echo "and commit the .png files into e2e/ to finalize the baseline."
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "======================================================"
