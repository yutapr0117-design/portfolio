name: AIO Effect Monitoring

# ======================================================================
# AIO効果監視ワークフロー（無料枠前提版）
#
# 対応エンジン:
#   Gemini (無料):  Google AI Studio 無料枠で動作。主力。
#   OpenAI (任意):  無料トライアルクレジット枠内のみ動作。
#                   クレジット切れ後は graceful skip（run は失敗しない）。
#   Perplexity:     廃止済み（無料 API 枠なし）。
#
# 必要な GitHub Secrets（Settings > Secrets > Actions）:
#   GEMINI_API_KEY   — Google AI Studio で無料取得。必須。
#   OPENAI_API_KEY   — 任意。無料クレジット切れ後は自動スキップ。
#
# ログ出力先: docs/evidence/aio-monitoring-log.json
# 引用状況に変化があった場合: GitHub Issue で通知
# ======================================================================

on:
  schedule:
    - cron: '0 1 * * 1'  # 毎週月曜 JST 10:00（UTC 01:00）
  workflow_dispatch:      # 手動実行も可能

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write         # aio-monitoring-log.json をコミットするため
  issues: write           # 変化検出時に Issue を作成するため

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── クエリ実行 & ログ記録 ──────────────────────────────────────────
      - name: Run AIO monitoring queries
        id: monitor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # PERPLEXITY_API_KEY は廃止済み（無料枠なし）
        run: python3 .github/scripts/aio_monitoring.py

      # ── ログをコミット ─────────────────────────────────────────────────
      - name: Commit monitoring log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/evidence/aio-monitoring-log.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(aio-monitoring): weekly log update $(date -u +%Y-%m-%d)"
            git push
          fi

      # ── 引用増加 → Issue で通知 ───────────────────────────────────────
      - name: Notify citation increase
        if: steps.monitor.outputs.citation_change == 'increase'
        uses: actions/github-script@v7
        with:
          script: |
            const delta = '${{ steps.monitor.outputs.citation_delta }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AIO] 引用数増加 +${delta} — ${new Date().toISOString().slice(0,10)}`,
              body: [
                '## AIO引用状況：増加を検出',
                '',
                `前回比 **+${delta}クエリ** で引用されました。`,
                '',
                '詳細: `docs/evidence/aio-monitoring-log.json` を確認してください。',
                '',
                '---',
                '*このIssueはAIO Monitoring ワークフローにより自動生成されました。*',
              ].join('\n'),
              labels: ['aio-monitoring', 'citation-increase'],
            });

      # ── 引用減少 → Issue で通知 ───────────────────────────────────────
      - name: Notify citation decrease
        if: steps.monitor.outputs.citation_change == 'decrease'
        uses: actions/github-script@v7
        with:
          script: |
            const delta = '${{ steps.monitor.outputs.citation_delta }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AIO] 引用数減少 -${delta} — ${new Date().toISOString().slice(0,10)}`,
              body: [
                '## AIO引用状況：減少を検出',
                '',
                `前回比 **-${delta}クエリ** 引用が減少しました。`,
                '',
                'AIOコンテンツの変更、または対象AIのインデックス変動の可能性があります。',
                '`docs/evidence/aio-monitoring-log.json` で詳細を確認してください。',
                '',
                '---',
                '*このIssueはAIO Monitoring ワークフローにより自動生成されました。*',
              ].join('\n'),
              labels: ['aio-monitoring', 'citation-decrease'],
            });
