name: Auto-Update AIO Digests

# ======================================================================
# AIO digest 自動同期ワークフロー
#
# トリガー対象ファイルが main に push されたとき、
# .well-known/index.json / agent-skills/index.json / aio-manifest.json の
# SHA-256 digest を自動再計算してコミットする。
#
# workflow_dispatch でも手動実行可能。
# digestがズレていると疑われる場合（ローカル編集後にCIが未トリガーだった等）に使用する。
#
# 設計判断:
# - [skip ci] サフィックスで architecture-validation.yml の再トリガーを防ぐ。
# - 変更がなければコミットしない (write_if_changed による冪等実装)。
# - contents: write 権限はこのワークフローのみに付与する。
# ======================================================================

on:
  push:
    branches: ["main"]
    paths:
      - "AI2AI.md"
      - "llms-full.txt"
      - "llms.txt"
      - "llms_well-known.txt"
      - ".well-known/llms.txt"
      - ".well-known/llms_well-known.txt"
      - "yuta-yokoi-ai-pm-orchestration-system.webp"
      - "yuta-yokoi-sakura-swing-ai-generated-portfolio-bgm.mp3"
      - "Claude2Claude.md"
      - "ChatGPT2ChatGPT.md"
      - "docs/evidence/ai-pioneer-identity-review.md"
      - "docs/evidence/real-work-claims.md"
      - "docs/evidence/aio-monitoring-log.json"
      - "docs/session-records/**"
      - "docs/incident-artifacts/**"
  workflow_dispatch:
    # 手動トリガー — digestがズレていると疑われる場合に使用

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

# v80+ CI hygiene: this workflow commits + pushes digest updates. Two near-simultaneous
# triggers (e.g. rapid pushes to main touching AIO files) would race on `git push` and the
# loser fails non-fast-forward (a red run). Serialize per-ref and DO NOT cancel in progress,
# so every triggering event is processed in order against the latest main (digests are a pure
# function of file content, so a queued run simply recomputes on the newest tree).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-digests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Recalculate and update AIO digests
        run: python3 .github/scripts/update_aio_digests.py

      - name: Commit updated digests (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            .well-known/index.json \
            .well-known/agent-skills/index.json \
            .well-known/aio-manifest.json

          if git diff --cached --quiet; then
            echo "No digest changes — nothing to commit."
          else
            git commit -m "chore: auto-update AIO digests [skip ci]"
            git push
            echo "Digests committed and pushed."
          fi
