name: Playwright Visual Regression & Behavior Validation

# ======================================================================
# 改善文書a Section 7.1/7.2: Artifacts > Declarations 原則を担保するE2Eテスト基盤
#
# - 7.1: Playwrightを用いた視覚的リグレッションテスト（ピクセル差分検知）
# - 7.2: 状態遷移・振る舞い検証（Behavior Checks）の自動化
#
# テスト定義: e2e/portfolio.spec.js（通常ファイル）
# 設定:       playwright.config.cjs（通常ファイル）
# スナップショットベースラインが存在しない場合、スクリーンショット差分テストは
# 自動的にスキップされます。ベースライン生成は update-playwright-snapshots.yml を使用。
# ======================================================================

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'index.html'
      - 'main.js'
      - 'js/**'
      - 'style.css'
      - 'aio-guard.js'
      - 'error-suppressor.js'
      - 'theme-init.js'
      - 'karte-init.js'
      - 'sw.js'
      - 'yuta-yokoi-ai-pm-orchestration-system.webp'
      - 'yuta-yokoi-sakura-swing-ai-generated-portfolio-bgm.mp3'
      - 'llms.txt'
      - 'llms-full.txt'
      - 'AI2AI.md'
      - '.well-known/**'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'e2e/**'
      - 'playwright.config.cjs'
      # The e2e toolchain itself lives in the dependency manifest: @playwright/test
      # (the runner) and @axe-core/playwright (a11y assertions) plus their transitive
      # deps can change e2e BEHAVIOR without any shipped-site file changing. Without
      # these in the trigger, a dep bump would skip the BLOCKING behavior gate and
      # ship an unverified test-toolchain change. Check 142 enforces their presence.
      - 'package.json'
      - 'package-lock.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  playwright-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          # v80+ CI hygiene: cache npm downloads keyed on
          # package-lock.json so `npm ci` restores from cache on repeat runs.
          cache: 'npm'

      - name: Install Playwright and dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # Behavior / functionality tests are the BLOCKING gate. Per Session Record #20 the
      # repository (not the rendered site) is the portfolio; the site is an appendage whose
      # functionality (loads / displays / comprehensible) must be protected, but pixel-level
      # visual regressions are acceptable. So functionality e2e blocks merges …
      - name: Run behavior / functionality tests (BLOCKING gate)
        run: npx playwright test --config=playwright.config.cjs --grep-invert "screenshot regression" --reporter=list

      # … and the homepage pixel screenshot is ADVISORY (observed, never blocking). An intentional
      # visual change makes this step red until the baseline is regenerated via the human-merged
      # update-playwright-snapshots.yml path — that red is expected and does NOT gate merges.
      - name: Run visual regression (ADVISORY — non-blocking, see Session Record #20 §3(B))
        continue-on-error: true
        run: npx playwright test --config=playwright.config.cjs --grep "screenshot regression" --reporter=list

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Upload snapshot diffs (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-snapshot-diffs
          path: |
            e2e/**/*-diff.png
            e2e/**/*-actual.png
          retention-days: 7
          if-no-files-found: ignore
