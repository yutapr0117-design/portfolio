name: Playwright Visual Regression & Behavior Validation

# ======================================================================
# 改善文書a Section 7.1/7.2: Artifacts > Declarations 原則を担保するE2Eテスト基盤
#
# - 7.1: Playwrightを用いた視覚的リグレッションテスト（ピクセル差分検知）
# - 7.2: 状態遷移・振る舞い検証（Behavior Checks）の自動化
#
# テスト定義: e2e/portfolio.spec.js（通常ファイル）
# 設定:       playwright.config.cjs（通常ファイル）
# スナップショットベースラインが存在しない場合、スクリーンショット差分テストは
# 自動的にスキップされます。ベースライン生成は update-playwright-snapshots.yml を使用。
# ======================================================================

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'index.html'
      - 'main.js'
      - 'js/**'
      - 'style.css'
      - 'aio-guard.js'
      - 'error-suppressor.js'
      - 'theme-init.js'
      - 'karte-init.js'
      - 'sw.js'
      - 'yuta-yokoi-ai-pm-orchestration-system.webp'
      - 'yuta-yokoi-sakura-swing-ai-generated-portfolio-bgm.mp3'
      - 'llms.txt'
      - 'llms-full.txt'
      - 'AI2AI.md'
      - '.well-known/**'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'e2e/**'
      - 'playwright.config.cjs'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  playwright-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          # v80+ CI hygiene: cache npm downloads keyed on
          # package-lock.json so `npm ci` restores from cache on repeat runs.
          cache: 'npm'

      - name: Install Playwright and dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --config=playwright.config.cjs --reporter=list

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Upload snapshot diffs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-snapshot-diffs
          path: |
            e2e/**/*-diff.png
            e2e/**/*-actual.png
          retention-days: 7
          if-no-files-found: ignore
