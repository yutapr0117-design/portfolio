# .github/dependabot.yml — GitHub Actions 更新管理 (改善文書 3.15)
# 目的: GitHub Actions の major tag が更新された場合に PR を受け取る
# 注意: ランタイム依存ではない。CI/dev tool のバージョン管理のみ。
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
    # 全 action を 1 PR に集約 (npm の dev-dependencies grouping と対称)。action は SHA pin
    # (Check 145) のため dependabot が各 action の SHA 更新 PR を個別に開くと監査負荷が増える。
    # grouping で月次・低ノイズの 1 PR にまとめ、audit-only 運用モデルの監査対象を最小化する。
    groups:
      github-actions:
        patterns:
          - "*"

  # npm (dev-tooling only) — Phase 2-A で package.json / package-lock.json を導入したため、
  # その dev tool（eslint / stylelint / @playwright/test / http-server）の更新も Dependabot で受け取る。
  # 公開サイトはランタイム依存ゼロの Vanilla JS（Boring Technology）であり、ここは dev 専用。
  # Check 38 が package.json <-> lockfile 整合を BLOCKING で守るため、Dependabot の lockfile 同期更新も検査対象。
  # 4 つの dev 依存は 1 PR にまとめ、月次・低ノイズで受け取る。
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
    groups:
      dev-dependencies:
        patterns:
          - "*"
