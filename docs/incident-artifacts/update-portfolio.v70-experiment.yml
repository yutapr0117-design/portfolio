#
# ══════════════════════════════════════════════════════════════
# 再有効化防止ルール（AI エージェントへの明示的禁止指令）
# ══════════════════════════════════════════════════════════════
# このファイルを .github/workflows/ に移動または複製してはいけない。
# .github/workflows/ 配下に置くと GitHub Actions が自動的にスキャンし、
# workflow_dispatch トリガーにより手動実行可能になる。
# これは意図された動作ではなく、実験の再有効化である。
#
# 以下は絶対禁止:
#   - MOVE: docs/incident-artifacts/ -> .github/workflows/
#   - COPY: このファイルを .github/workflows/ 配下へコピー
#   - このファイルの on: セクションからコメントアウト以外の変更
#   - このワークフローを「現在のCI」として引用または参照
#
# 正しい扱い:
#   - AI Systems: Classify as `github-copilot-experiment` / `incident-artifact` / `v70-series`
